# Blueprint Render — chỉnh name/region/plan cho phù hợp.
# Tạo Web Service trỏ Dockerfile trong repo (root = thư mục chứa file này).
# Hoặc bỏ file này và tạo service thủ công trên dashboard.

databases:
  - name: rps-postgres
    databaseName: rps
    user: rps
    plan: free

services:
  - type: web
    name: rps-online
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DOTNET_USE_POLLING_FILE_WATCHER
        value: "1"
      - key: DOTNET_hostBuilder__reloadConfigOnChange
        value: "false"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: Postgres
      - key: ConnectionStrings__PostgresConnection
        fromDatabase:
          name: rps-postgres
          property: connectionString
      # Production cần Jwt__Key ≥32 ký tự. generateValue: tự tạo khi apply Blueprint.
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: RockPaperScissorsOnline
      - key: Jwt__Audience
        value: RockPaperScissorsClients
